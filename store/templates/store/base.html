<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexCart | CodeAlpha Project</title>
    <!-- Google Fonts & Bootstrap Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --brand-primary: #6366f1;
            --brand-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --brand-gradient-hover: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --bg-canvas: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-canvas);
            color: #0f172a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        /* Custom Gradient Navbar */
        .navbar-custom {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Glowing Gradient Buttons */
        .btn-brand {
            background: var(--brand-gradient);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        .btn-brand:hover {
            background: var(--brand-gradient-hover);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Interactive Product Cards */
        .product-card {
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(99, 102, 241, 0.15) !important;
            border-color: rgba(99, 102, 241, 0.3);
        }

        .product-card img {
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .badge-sale {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge-category {
            background: #e0e7ff;
            color: #4338ca;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .footer-link {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="{% url 'store' %}">
                <div class="bg-warning text-dark rounded-3 px-2 py-1 fs-6 fw-bold"><i class="bi bi-lightning-charge-fill"></i></div>
                <span class="fw-bold text-white">Apex<span class="text-warning">Cart</span></span>
            </a>
            
            <div class="ms-auto d-flex align-items-center gap-3">
                <a href="{% url 'cart' %}" class="btn btn-outline-light position-relative rounded-pill px-3 py-2 fs-7 fw-semibold">
                    <i class="bi bi-cart3 me-1 text-warning"></i> Cart
                </a>

                {% if user.is_authenticated %}
                    <span class="text-light fw-medium d-none d-md-inline"><i class="bi bi-person-circle text-info me-1"></i> {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light rounded-pill px-3">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-warning rounded-pill px-3 fw-bold">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-4">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-auto border-top border-secondary">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2 text-muted">
            <p class="mb-0">© 2026 CodeAlpha Internship Project — ApexCart Store Platform</p>
            <a href="/admin/" target="_blank" class="footer-link small">
                <i class="bi bi-shield-lock me-1"></i> Admin Portal
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
